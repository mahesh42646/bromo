# Bromo API — fix "413 Request Entity Too Large" on /media/upload and /media/upload-async
# (nginx default client_max_body_size is 1m; the API allows up to ~600MB per multer.)
#
# Include inside the same `server { }` that proxies to Node, or merge directives into your location.

# Option A — whole API vhost (simplest)
client_max_body_size 650m;
client_body_timeout 300s;
proxy_read_timeout 900s;
proxy_send_timeout 900s;

